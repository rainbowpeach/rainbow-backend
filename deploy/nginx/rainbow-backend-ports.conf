# Shared dual-environment Nginx config.
# Test backend: 127.0.0.1:18081, uploads: /opt/rainbow-backend/uploads/test.
# Prod backend: 127.0.0.1:28081, uploads: /opt/rainbow-backend/uploads/prod.
#
# The public H5 server is intentionally a catch-all. Host -> scene_code is
# configured in the database through /api/admin/scene-domains, not in Nginx.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/rainbow-backend/www/h5;
    index index.html;
    client_max_body_size 60m;

    location /api/ {
        proxy_pass http://127.0.0.1:28081;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://127.0.0.1:28081;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /static/ {
        proxy_pass http://127.0.0.1:28081;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

